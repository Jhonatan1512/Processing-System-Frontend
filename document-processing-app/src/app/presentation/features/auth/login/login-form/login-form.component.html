<div class="form-header">
  <h3 class="form-title">Iniciar Sesión</h3>
  <p class="form-subtitle">Ingrese sus credenciales de acceso</p>
</div>

<form [formGroup]="loginForm" (ngSubmit)="login()" class="auth-form">
  <div class="form-group">
    <label class="form-label">Usuario o Email</label>
    <div class="input-group">
      <span class="material-icons">person</span>
      <input
        type="text"
        placeholder="User Name"
        id="usuario"
        formControlName="usuario"
        [class.input-error]="
          loginForm.get('usuario')?.invalid && loginForm.get('usuario')?.touched"/>
    </div>
    <span
      class="error-text"
      *ngIf="
        loginForm.get('usuario')?.invalid && loginForm.get('usuario')?.touched">
      El usuario es obligatorio
    </span>
  </div>

  <div class="form-group">
    <label class="form-label">Contraseña</label>
    <div class="input-group">
      <span class="material-icons">lock</span>
      <input
        [type]="showPassword ? 'text' : 'password'"
        placeholder="Password"
        id="password"
        formControlName="password"
        [class.input-error]="
          loginForm.get('password')?.invalid &&
          loginForm.get('password')?.touched"/>
 
      <button type="button" class="show-password" (click)="togglePassword()">
        <span class="material-icons">
          {{ showPassword ? "visibility_off" : "visibility" }}
        </span>
      </button>
    </div>
    <span
      class="error-text"
      *ngIf="
        loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
      La contraseña es obligatoria
    </span>
  </div>

  <div class="api-error" *ngIf="mensajeError">
    <span class="material-icons">error</span>
    {{ mensajeError }}
  </div>

  <button
    type="button"
    class="submit-btn"
    (click)="login()"
    [disabled]="cargando">
    {{ cargando ? "Verificando..." : "Ingresar al Sistema" }}
  </button>
</form>

<div class="form-footer">
  <p>¿No tienes cuenta? <a href="javascript:void(0)" (click)="emitirIrARegistro()">Regístrate Aquí</a></p>
</div>
