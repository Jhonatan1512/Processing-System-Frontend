<div class="modal-overlay">
  <div class="modal-container">
    
    <div class="modal-header">
      <div class="modal-title-group">
        <span class="material-icons title-icon">post_add</span>
        <h3>Registrar Tipo de Documento</h3>
      </div>
      <button class="close-icon-btn" type="button" title="Cerrar" (click)="cerrar()">
        <span class="material-icons">close</span>
      </button>
    </div>

    <div class="modal-body">
      <form class="custom-form" [formGroup]="registerForm">
        
        <div class="form-group">
          <label 
            [class.label-error]="registerForm.get('nombre')?.invalid &&
            registerForm.get('nombre')?.touched">
                Nombre del Documento <span class="required-asterisk">*</span></label>
          <div class="input-wrapper">
            <span class="material-icons input-icon">title</span>
            <input 
              type="text"
              class="form-control" 
              placeholder="Ej. Resolución Directoral" 
              autocomplete="off"
              formControlName="nombre"
              [class.input-error]="registerForm.get('nombre')?.invalid &&
              registerForm.get('nombre')?.touched">
          </div>
        </div>

        <div class="form-group">
          <label [class.label-error]="registerForm.get('descripcion')?.invalid &&
            registerForm.get('descripcion')?.touched">
                Descripción <span class="required-asterisk">*</span>
          </label>
          <textarea 
            class="form-control textarea-control" 
            rows="4" 
            placeholder="Escribe el propósito o uso de este documento..."
            formControlName="descripcion"
            [class.input-error]="registerForm.get('descripcion')?.invalid &&
              registerForm.get('descripcion')?.touched">
          </textarea>
        </div>
 
        <p class="error-api" *ngIf="isError">
            <span class="material-icons">warning</span>{{mensaje}}
        </p>

      </form>
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" type="button" (click)="cerrar()">
        Cancelar
      </button>
      <button class="btn-primary" type="button" (click)="crearRegistro()">
        <span class="material-icons">save</span>
        {{editRegister ? 'Guardar Cambios' : 'Registrar Tipo Documento'}}
      </button>
    </div>

  </div>
</div>
