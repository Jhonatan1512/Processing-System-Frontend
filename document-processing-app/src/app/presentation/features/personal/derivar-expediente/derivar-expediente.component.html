<div class="modal-overlay">
  <div class="modal-container">
    
    <div class="modal-header">
      <div class="modal-title">
        <span class="material-icons" style="color: #3b82f6;">swap_horiz</span>
        <h3>Registrar Movimiento ({{numeroExpdiente}})</h3>
      </div>
      <button type="button" class="btn-close" title="Cerrar modal" (click)="cerraModal()">
        <span class="material-icons">close</span>
      </button>
    </div>

    <form [formGroup]="formRegister" (ngSubmit)="registrarMovimiento()">
      <div class="modal-body">
        <p class="text-muted">Complete los datos para derivar o actualizar el estado de este expediente.</p>
        
        <div class="form-row">
          
          <div class="form-group flex-1">
            <label for="oficinaDestinoId" class="form-label">Oficina Destino</label>
            <select id="oficinaDestinoId" formControlName="oficinaDestinoId" class="form-control select-icon">
              <option value="" disabled selected>Seleccione una oficina...</option>
              <option *ngFor="let oficina of listaOficinas" [value]="oficina.id">{{oficina.nombre}}</option>
            </select>
          </div> 
        </div>

        <div class="form-group" style="margin-top: 16px;">
          <label for="comentarioDerivacion" class="form-label">Comentario de Derivación</label>
          <textarea 
            id="comentarioDerivacion" 
            formControlName="comentarioDerivacion"
            class="form-control" 
            rows="4" 
            placeholder="Ej: Se deriva el expediente para su evaluación y visto bueno correspondiente..."></textarea>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="cerraModal()">Cancelar</button>
        <button type="submit" class="btn-primary" style="background-color: #3b82f6; border-color: #2563eb;">
          <span class="material-icons">send</span>
          Registrar Movimiento
        </button>
      </div>

    </form>
  </div>
</div>
